<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <title>Admin Login | NexaHomes</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive_patches.css">
    <style>
        .admin-brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .admin-brand h1 {
            color: var(--accent-color);
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .error-message {
            background: rgba(255, 0, 0, 0.1);
            color: #ff4d4d;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }
    </style>
</head>

<body style="min-height: 100vh; display: flex; flex-direction: column;">

    <!-- Header -->
    <header>
        <div class="container flex justify-between items-center">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.svg" alt="NexaHomes" style="height: 35px; display: block;">
            </a>
            <nav class="nav-links flex items-center">
                <a href="index.html">Main Site</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="auth-wrapper"
        style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
        <div class="auth-container" style="max-width: 450px; width: 100%;">
            <div class="admin-brand">
                <i class="fas fa-user-shield" style="font-size: 3rem; color: var(--accent-color);"></i>
                <h1>ADMIN PANEL</h1>
                <p style="color: #888; font-size: 0.9rem;">Secure Access for Management Only</p>
            </div>

            <div id="error-box" class="error-message">Invalid Admin Credentials.</div>

            <div class="auth-form-container"
                style="background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 30px;">
                <form id="admin-login-form">
                    <div class="form-group">
                        <label for="admin-email">Admin Email</label>
                        <input type="email" id="admin-email" class="auth-input" placeholder="admin@gmail.com" required>
                    </div>
                    <div class="form-group">
                        <label for="admin-pass">Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="admin-pass" class="auth-input" placeholder="••••••••" required>
                            <i class="far fa-eye password-toggle" id="toggle-password"></i>
                        </div>
                    </div>
                    <button type="submit" class="btn auth-btn" style="width: 100%; margin-top: 10px;">AUTHORIZE
                        ACCESS</button>
                </form>
            </div>

            <p style="text-align: center; margin-top: 20px; font-size: 0.8rem; color: #555;">
                &copy; 2026 NexaHomes Internal System
            </p>
        </div>
    </main>

    <!-- Scripts -->
    <script src="assets/js/auth.js"></script>
    <script>
        // Password Visibility Toggle
        const togglePassword = document.querySelector('#toggle-password');
        const passwordInput = document.querySelector('#admin-pass');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Admin Login Validation
        document.getElementById('admin-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            const errorBox = document.getElementById('error-box');

            // Hardcoded Credentials as per request
            if (email === 'admin@gmail.com' && pass === 'admin123') {
                Auth.login(Auth.ROLES.ADMIN, { email: email, name: 'System Admin' });
                window.location.href = 'admin-dashboard.html';
            } else {
                errorBox.style.display = 'block';
                // Shake effect for feedback
                const container = document.querySelector('.auth-container');
                container.style.animation = 'none';
                void container.offsetWidth; // trigger reflow
                container.style.animation = 'shake 0.5s ease-in-out';
            }
        });
    </script>

    <style>
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-10px);
            }

            40%,
            80% {
                transform: translateX(10px);
            }
        }
    </style>
</body>

</html>
